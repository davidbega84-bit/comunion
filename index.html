<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Primera Comunión</title>
<meta property="og:title" content="Primera Comunión de Mar">
<meta property="og:description" content="¡Mar te invita a su comunión! Pincha para ver la invitación, las ubicaciones y la cuenta atrás.">
<meta property="og:image" content=https://davidbega84-bit.github.io/comunion/miniatura_whatsapp.jpg>
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --crema:#F3EBDA;
    --azul:#5F7E92;
    --azul-hondo:#4C6879;
    --dorado:#C2A56A;
    --taupe:#8F8069;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--crema);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;overflow:hidden;
  }

  .marco{position:relative;line-height:0}
  .marco img{display:block;max-width:100vw;max-height:100dvh;width:auto;height:auto}

  /* Base colocable: el % marca el CENTRO del elemento */
  .movible{position:absolute;transform:translate(-50%,-50%);opacity:0;transition:opacity .25s ease}
  body.listo .movible{opacity:1}

  /* ---------- Marcador de ubicacion: solo el icono ---------- */
  .punto{
    display:inline-flex;align-items:center;justify-content:center;
    width:42px;height:42px;
    background:rgba(243,235,218,.86);
    border:1px solid rgba(194,165,106,.7);
    border-radius:50%;text-decoration:none;
    box-shadow:0 3px 10px rgba(76,104,121,.22);
    -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
    animation:respira 3.4s ease-in-out infinite;
  }
  .punto .pin{width:19px;height:23px;flex:none}
  @keyframes respira{
    0%,100%{box-shadow:0 3px 10px rgba(76,104,121,.22)}
    50%    {box-shadow:0 3px 16px rgba(95,126,146,.42)}
  }
  .punto:active{transform:translate(-50%,-50%) scale(.94)}

  /* ---------- Palabra "faltan" (flotante, independiente) ---------- */
  .titulo-cuenta{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:22px;letter-spacing:.02em;
    color:#5F7E92;          /* <- color de la palabra "faltan" */
    white-space:nowrap;
    text-shadow:0 1px 4px rgba(243,235,218,.95);
  }

  /* ---------- Cuenta atras: un unico cuadro ---------- */
  .cuenta{
    display:flex;
    background:rgba(243,235,218,.9);
    border:1px solid rgba(194,165,106,.65);
    border-radius:14px;
    box-shadow:0 3px 12px rgba(76,104,121,.22);
    -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
    overflow:hidden;
  }
  .cuenta > div{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:8px 15px;
    border-right:1px solid rgba(194,165,106,.4);
  }
  .cuenta > div:last-child{border-right:none}
  .cuenta .num{
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;line-height:1;
    color:var(--azul);
    font-variant-numeric:lining-nums tabular-nums;
    font-feature-settings:"lnum" 1,"tnum" 1;
  }
  .cuenta .lab{
    margin-top:5px;line-height:1;
    font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);
  }

  @media (prefers-reduced-motion: reduce){.punto{animation:none}}

  /* ---------- Modo ajustar ---------- */
  body.editar .movible{cursor:grab;touch-action:none}
  body.editar .punto{animation:none}
  body.editar .movible.arrastrando{cursor:grabbing;opacity:.85}
  #barra{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:#1b2016;color:#eef2e6;font-size:13px;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:none;align-items:center;justify-content:space-between;gap:12px;
  }
  body.editar #barra{display:flex}
  #barra code{font-family:ui-monospace,monospace;color:#C2A56A;font-size:12px}
  #guardar{
    flex:none;background:#C2A56A;color:#241f14;border:none;border-radius:999px;
    padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;
  }
  #guardar:disabled{opacity:.7}
  #toggle{
    position:fixed;top:10px;right:10px;z-index:60;
    background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.4);
    border-radius:999px;padding:8px 14px;font-size:12px;cursor:pointer;
  }
</style>
</head>
<body>

  <div class="marco" id="marco">

    <!-- CAMBIA 1) TU IMAGEN (URL directa de la foto). -->
    <img id="foto" src="https://davidbega84-bit.github.io/comunion/invitacion-comunion.PNG" alt="Invitacion a la Primera Comunion de Mar">


    <!-- CAMBIA 2) MISA: href = Google Maps del Colegio Ausias March. -->
    <a class="movible punto" id="misa" href="https://maps.app.goo.gl/PaLjytowexmsCVHP6" target="_blank" rel="noopener"
       aria-label="Cómo llegar a la misa" style="left:73%; top:63%;">
      <svg class="pin" viewBox="0 0 24 30" fill="none" aria-hidden="true">
        <path d="M12 1C6.5 1 2.5 5 2.5 10.3 2.5 17 12 29 12 29s9.5-12 9.5-18.7C21.5 5 17.5 1 12 1z"
              fill="var(--azul)" stroke="#fff" stroke-width="1.3"/>
        <circle cx="12" cy="10.3" r="3.4" fill="var(--crema)"/>
      </svg>
    </a>


    

    <!-- CAMBIA 3) CELEBRACION: href = Google Maps del Restaurante Jardin de Azahares. -->
    <a class="movible punto" id="celebracion" href="https://maps.app.goo.gl/BuQ8K4h4HEPy1agj9" target="_blank" rel="noopener"
       aria-label="Cómo llegar a la celebración" style="left:73%; top:79%;">
      <svg class="pin" viewBox="0 0 24 30" fill="none" aria-hidden="true">
        <path d="M12 1C6.5 1 2.5 5 2.5 10.3 2.5 17 12 29 12 29s9.5-12 9.5-18.7C21.5 5 17.5 1 12 1z"
              fill="var(--azul)" stroke="#fff" stroke-width="1.3"/>
        <circle cx="12" cy="10.3" r="3.4" fill="var(--crema)"/>
      </svg>
    </a>


    <!-- Palabra "faltan": flotante e independiente. -->
    <div class="movible titulo-cuenta" id="faltan" style="left:50%; top:85%;">faltan</div>

    <!-- CUENTA ATRAS: un unico cuadro. -->
    <div class="movible cuenta" id="cuenta" style="left:50%; top:92%;">
      <div><span class="num" id="cd">--</span><span class="lab">días</span></div>
      <div><span class="num" id="ch">--</span><span class="lab">horas</span></div>
      <div><span class="num" id="cm">--</span><span class="lab">min</span></div>
    </div>

  </div>

  <button id="toggle">Ajustar</button>
  <div id="barra">
    <span id="lectura">Arrastra los elementos y pulsa Guardar.</span>
    <button id="guardar">Guardar posiciones</button>
  </div>

<script>
  /* CAMBIA 4) FECHA Y HORA de la misa. Mes de 0 a 11 -> 8 = septiembre.
     26 de septiembre de 2026 a las 11:00: */
  var FECHA_EVENTO = new Date(2026, 8, 26, 11, 0);

  function pintarCuenta(){
    var ms = FECHA_EVENTO - new Date();
    if(ms < 0) ms = 0;
    document.getElementById('cd').textContent = Math.floor(ms/864e5);
    document.getElementById('ch').textContent = Math.floor(ms%864e5/36e5);
    document.getElementById('cm').textContent = Math.floor(ms%36e5/6e4);
  }
  pintarCuenta(); setInterval(pintarCuenta, 30000);

  /* ---- Aplicar las posiciones guardadas al abrir ---- */
  /* El servidor incrusta aqui las posiciones guardadas (o null si no hay). */
  var POSICIONES = <?!= posiciones ?>;

  function aplicarPosiciones(pos){
    if(!pos) return;
    Object.keys(pos).forEach(function(id){
      var el = document.getElementById(id);
      if(el){ el.style.left = pos[id].l; el.style.top = pos[id].t; }
    });
  }

  // Se aplican al instante (sin esperar al servidor) y se muestran ya colocados.
  try{ aplicarPosiciones(POSICIONES); }catch(e){}
  document.body.classList.add('listo');

  var hayBackend = (typeof google !== 'undefined' && google.script && google.script.run);

  /* ---- Modo ajustar ---- */
  var editar=false, marco=document.getElementById('marco'), lectura=document.getElementById('lectura');

  /* CAMBIA 5) INTERRUPTOR DEL BOTON "AJUSTAR".
     false = oculto para los invitados · true = visible para recolocar. */
  var MODO_AJUSTE = false;
  if(!MODO_AJUSTE){ document.getElementById('toggle').style.display='none'; }

  document.getElementById('toggle').addEventListener('click', function(){
    editar=!editar;
    document.body.classList.toggle('editar', editar);
    this.textContent = editar ? 'Terminar' : 'Ajustar';
    if(editar) lectura.textContent = 'Arrastra los elementos y pulsa Guardar.';
  });

  document.querySelectorAll('.movible').forEach(function(el){
    el.addEventListener('pointerdown', function(e){
      if(!editar) return;
      e.preventDefault(); el.classList.add('arrastrando'); el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', function(e){
      if(!editar || !el.classList.contains('arrastrando')) return;
      var r=marco.getBoundingClientRect();
      var x=Math.min(100,Math.max(0,(e.clientX-r.left)/r.width*100));
      var y=Math.min(100,Math.max(0,(e.clientY-r.top)/r.height*100));
      el.style.left=x.toFixed(1)+'%'; el.style.top=y.toFixed(1)+'%';
    });
    el.addEventListener('pointerup', function(){ el.classList.remove('arrastrando'); });
    el.addEventListener('click', function(e){ if(editar) e.preventDefault(); });
  });

  /* ---- Guardar posiciones ---- */
  document.getElementById('guardar').addEventListener('click', function(){
    var boton = this, pos = {};
    document.querySelectorAll('.movible').forEach(function(el){
      if(el.id) pos[el.id] = { l: el.style.left, t: el.style.top };
    });
    var json = JSON.stringify(pos);
    if(hayBackend){
      boton.disabled = true; boton.textContent = 'Guardando…';
      google.script.run
        .withSuccessHandler(function(){ boton.disabled=false; boton.textContent='✓ Guardado'; })
        .withFailureHandler(function(){ boton.disabled=false; boton.textContent='Error, reintenta'; })
        .guardarPosiciones(json);
    } else {
      /* Vista local sin servidor (abrir el archivo directamente) */
      prompt('Posiciones (solo se guardan de verdad en la web publicada):', json);
    }
  });
</script>
</body>
</html>
